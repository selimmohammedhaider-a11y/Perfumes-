<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Perfumes | Luxury Collection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #fff; color: #000; scroll-behavior: smooth; }

        /* Navigation - Thinner and Cleaner */
        header {
            padding: 0 5%; /* شلنا الـ padding اللي فوق وتحت خالص */
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            height: 60px; /* ثبتنا الارتفاع بـ 60px بس عشان يبقى رفيع جداً */
            border-bottom: 1px solid #f0f0f0;
            box-shadow: 0 1px 5px rgba(0,0,0,0.03); /* ظل خفيف جداً */
        }
        
        /* كروص اللوجو لقص المساحات البيضاء الزيادة */
        .logo {
            display: flex;
            align-items: center;
            height: 100%;
            width: 150px; /* حددنا عرض لمكان اللوجو */
        }
        .logo img { 
            height: 120px; /* كبرنا الارتفاع جداً */
            width: 100%;
            object-fit: cover; /* دي أهم خاصية! بتعمل crop تلقائي وتخبي الهوامش البيضاء الزيادة */
            object-position: center top; /* بتظبط مكان القص عشان اللوجو يبقى في النص */
            margin-top: 5px; /* تظبيط مكان اللوجو */
        }
        
        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 25px; }
        nav ul li a { 
            text-decoration: none; 
            color: #000; 
            font-size: 10px; /* صغرنا الخط شوية للشياكة */
            letter-spacing: 2.5px; 
            text-transform: uppercase; 
            font-weight: bold; 
            opacity: 0.8;
            transition: 0.3s;
        }
        nav ul li a:hover { opacity: 1; }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100%;
            height: 85vh; /* زودنا الارتفاع شوية */
            margin-top: 60px; /* نفس ارتفاع الهيدر الجديد */
            overflow: hidden;
        }
        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1); /* شفافية أخف */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .explore-btn {
            padding: 16px 45px;
            background: #fff;
            color: #000;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #fff;
            transition: 0.3s;
        }
        .explore-btn:hover { background: transparent; color: #fff; }

        /* Products Grid */
        .shop-section { padding: 80px 5%; text-align: center; }
        .section-title { font-size: 24px; letter-spacing: 7px; text-transform: uppercase; margin-bottom: 60px; }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* تظبيط العرض للموبايل */
            gap: 40px;
        }
        .product-card { text-align: center; }
        .product-card img {
            width: 100%;
            height: 350px; /* صغرنا الطول شوية عشان يبقوا كلهم نفس الطول */
            object-fit: contain;
            background: #fcfcfc;
            margin-bottom: 20px;
        }
        .product-card h3 { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
        .product-card p { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 5px; }

        footer { background: #000; color: #fff; padding: 40px; text-align: center; }
        .footer-logo img { width: 150px; filter: invert(1); }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="Logo.png" alt="Unique Perfumes">
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#collection">Shop</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <img src="Landscape.jpg" alt="Luxury Background">
        <div class="hero-overlay">
            <a href="#collection" class="explore-btn">Explore Collection</a>
        </div>
    </section>

    <section class="shop-section" id="collection">
        <h2 class="section-title">The Collection</h2>
        <div class="product-grid">
            <div class="product-card"><img src="Spicebombextrem.jpg"><h3>Spicebomb Extreme</h3><p>Viktor & Rolf</p></div>
            <div class="product-card"><img src="Jpgultramale.jpg"><h3>Ultra Male</h3><p>JPG</p></div>
            <div class="product-card"><img src="Myselflaperfume.jpg"><h3>MYSLF Le Parfum</h3><p>YSL</p></div>
            <div class="product-card"><img src="Valntinoborninroma.jpg"><h3>Born In Roma</h3><p>Valentino</p></div>
            <div class="product-card"><img src="Versace.jpg"><h3>Eros</h3><p>Versace</p></div>
            <div class="product-card"><img src="Yslmyselfedp.jpg"><h3>MYSLF EDP</h3><p>YSL</p></div>
            <div class="product-card"><img src="Ysly.jpg"><h3>Y EDP</h3><p>YSL</p></div>
        </div>
    </section>

    <footer>
        <div class="footer-logo"><img src="Logo.png"></div>
        <p style="font-size: 9px; letter-spacing: 2px; color: #444; margin-top: 20px;">© 2026 UNIQUE PERFUMES</p>
    </footer>

</body>
</html>
